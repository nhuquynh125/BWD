<style>
body { overflow: hidden; }
.messages-layout { display:flex; height:100vh; margin-left:var(--sidebar-w); }
.convos-panel { width:300px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.convos-head   { padding:20px 18px 14px; border-bottom:1px solid var(--border); }
.convos-head h2 { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:12px; }
.convos-scroll { overflow-y:auto; flex:1; }
.convo-item { display:flex; align-items:center; gap:11px; padding:11px 18px; cursor:pointer; transition:background .15s; position:relative; }
.convo-item:hover   { background:var(--surface2); }
.convo-item.active  { background:var(--accent-dim); border-right:2px solid var(--accent); }
.convo-info { flex:1; min-width:0; }
.convo-name    { font-size:13.5px; font-weight:500; margin-bottom:2px; }
.convo-preview { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.convo-preview.unread { color:var(--text); font-weight:500; }
.convo-time  { font-size:10.5px; color:var(--text-muted); }
.unread-dot  { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.chat-area  { flex:1; display:flex; flex-direction:column; min-width:0; }
.chat-head  { padding:14px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--surface); }
.chat-head h3     { font-size:14.5px; font-weight:600; }
.chat-status      { font-size:11.5px; color:var(--green); }
.msgs-body        { flex:1; overflow-y:auto; padding:20px 22px; display:flex; flex-direction:column; gap:5px; }
.msg-row          { display:flex; gap:8px; align-items:flex-end; }
.msg-row.sent     { flex-direction:row-reverse; }
.msg-row.system   { justify-content:center; margin:12px 0; }
.bubble           { max-width:64%; padding:9px 13px; border-radius:15px; font-size:13.5px; line-height:1.55; }
.bubble.recv      { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:3px; }
.bubble.sent      { background:linear-gradient(135deg,var(--accent),#b8934e); color:#0a0b10; font-weight:500; border-bottom-right-radius:3px; }
.bubble.system    { background:transparent; border:none; color:var(--text-muted); text-align:center; font-size:12.5px; max-width:80%; }
.msg-time         { font-size:10px; color:var(--text-dim); margin-top:3px; }
.msg-row.sent .msg-time { text-align:right; }
.bubble img { max-width:220px; border-radius:10px; display:block; margin-top:6px; cursor:pointer; }
.chat-input-area  { padding:14px 22px; border-top:1px solid var(--border); background:var(--surface); }
.input-row        { display:flex; gap:10px; align-items:flex-end; }
.msg-textarea     { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 14px; color:var(--text); font-size:13.5px; font-family:inherit; resize:none; outline:none; min-height:42px; max-height:110px; transition:border-color .2s; }
.msg-textarea:focus { border-color:var(--accent); }
.send-btn         { width:42px; height:42px; background:var(--accent); border:none; border-radius:var(--radius); color:var(--bg); font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; cursor:pointer; }
.send-btn:hover   { background:#d4b57a; transform:scale(1.05); }
.icon-btn         { width:36px; height:36px; background:none; border:1px solid var(--border); border-radius:var(--radius); color:var(--text-muted); font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; flex-shrink:0; }
.icon-btn:hover   { border-color:var(--accent); color:var(--accent); }
.empty-chat       { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-muted); flex-direction:column; gap:12px; }
.ws-status        { font-size:11px; padding:3px 8px; border-radius:20px; }
.ws-status.online  { background:rgba(78,203,113,.15); color:var(--green); }
.ws-status.offline { background:rgba(224,92,92,.15); color:var(--red); }
.emoji-picker { position:absolute; bottom:100%; left:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; display:none; flex-wrap:wrap; gap:4px; max-width:260px; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,.4); }
.emoji-picker.open { display:flex; }
.emoji-btn { font-size:20px; cursor:pointer; padding:4px; border-radius:6px; transition:background .15s; border:none; background:none; }
.emoji-btn:hover { background:var(--surface2); }
.new-chat-modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; }
.new-chat-modal.open { display:flex; }
.new-chat-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:360px; }
.new-chat-box h3 { font-size:16px; margin-bottom:14px; }
.user-result { display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; cursor:pointer; transition:background .15s; }
.user-result:hover { background:var(--surface2); }
.back-to-convos { display:none; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; margin-right:8px; }

@media (max-width: 640px) {
    .messages-layout { margin-left: 0; padding-bottom: calc(64px + env(safe-area-inset-bottom)); position: relative; height: 100dvh; }
    .convos-panel { width: 100%; border-right: none; }
    .chat-area { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: calc(64px + env(safe-area-inset-bottom)); background: var(--bg); z-index: 10; }
    .chat-area.active { display: flex; }
    .back-to-convos { display: block; }
    .chat-head { padding: 10px 16px; }
    .chat-input-area { padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    body.keyboard-open .sidenav { display: none; }
    body.keyboard-open .messages-layout { padding-bottom: 0; }
    body.keyboard-open .chat-area { bottom: 0; }
}

<script>
let activeUserId   = null;
let activeUsername = '';
const me = LunarAPI.currentUser();

// ── Guard ────────────────────────────────────────────────
if (!me) { window.location.href = 'login.html'; }

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    renderNavAvatar();
    await loadConversations();

    // Open conversation from URL param
    const params = new URLSearchParams(location.search);
    const uid = params.get('user');
    if (uid) openChat(uid, '...');

    // WebSocket
    LunarWS.connect();
    LunarWS.onMessage(handleWsMessage);
    updateWsStatus();
    setInterval(updateWsStatus, 3000);

    // Search filter
    document.getElementById('searchConvo').addEventListener('input', filterConvos);
});

function renderNavAvatar() {
    const el = document.getElementById('navAvatar');
    if (!el || !me) return;
    if (me.avatar_url) el.innerHTML = `<img loading="lazy" src="${apiImg(me.avatar_url)}" alt="">`;
    else el.textContent = (me.username||'U')[0].toUpperCase();
}

// ── WebSocket status ──────────────────────────────────────
function updateWsStatus() {
    const el  = document.getElementById('wsStatus');
    const ok  = LunarWS._socket?.connected === true;
    if (el) {
        el.className  = 'ws-status ' + (ok ? 'online' : 'offline');
        el.textContent = ok ? '● Đã kết nối' : '● Ngoại tuyến';
    }
}

function handleWsMessage(msg) {
    updateWsStatus();
    if (msg.type === 'message') {
        const d = msg.data;
        if (d.sender_id === activeUserId || d.receiver_id === activeUserId) {
            appendBubble(d.content, false, d.created_at, d.image_url, d.message_type);
        }
        updateConvoPreview(d.sender_id, d.content || '[Hình ảnh]');
    } else if (msg.type === 'typing') {
        if (msg.senderId === activeUserId) {
            showTypingIndicator(msg.isTyping);
        }
    }
}

// ── Typing Indicator ──────────────────────────────────────
let typingTimer;
function onTyping() {
    LunarWS.send('typing', { receiverId: activeUserId, isTyping: true });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
        LunarWS.send('typing', { receiverId: activeUserId, isTyping: false });
    }, 2000);
}

function showTypingIndicator(isTyping) {
    let indicator = document.getElementById('typingIndicator');
    if (isTyping) {
        if (!indicator) {
            indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'msg-row';
            indicator.innerHTML = `
                <div class="avatar avatar-sm" style="flex-shrink:0">${(activeUsername[0]||'?').toUpperCase()}</div>
                <div class="bubble recv" style="padding: 12px 16px;">
                    <div class="typing-indicator" style="padding: 0; border: none; background: transparent;">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                    </div>
                </div>`;
            document.getElementById('msgsBody').appendChild(indicator);
            scrollToBottom();
        }
    } else {
        if (indicator) indicator.remove();
    }
}

// ── Conversations ─────────────────────────────────────────
async function loadConversations() {
    try {
        const { conversations } = await LunarAPI.getConversations();
        renderConvoList(conversations);
    } catch {
        document.getElementById('convoList').innerHTML =
            '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">Không thể tải cuộc trò chuyện</div>';
    }
}

function renderConvoList(convos) {
    const list = document.getElementById('convoList');
    if (!convos.length) {
        list.innerHTML = '<div style="padding:24px;text-align:center"><div style="font-size:36px;margin-bottom:10px">💬</div><p style="color:var(--text-muted);font-size:13px">Chưa có tin nhắn nào</p></div>';
        return;
    }
    list.innerHTML = convos.map(c => `
        <div class="convo-item" id="convo-${c.id}" onclick="openChat('${c.id}','${esc(c.username)}')">
          <div class="avatar avatar-sm" style="position:relative;flex-shrink:0">
            ${c.avatar_url ? `<img loading="lazy" src="${apiImg(c.avatar_url)}" alt="">` : (c.username||'U')[0].toUpperCase()}
          </div>
          <div class="convo-info">
            <div class="convo-name">${esc(c.username)}</div>
            <div class="convo-preview ${c.unread>0?'unread':''}" id="preview-${c.id}">${esc(c.last_message || 'Bắt đầu trò chuyện')}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div class="convo-time">${fmtTime(c.last_time)}</div>
            ${c.unread>0 ? `<div class="badge">${c.unread}</div>` : ''}
          </div>
        </div>`).join('');
}

function filterConvos() {
    const q = document.getElementById('searchConvo').value.toLowerCase();
    document.querySelectorAll('.convo-item').forEach(el => {
        const name = el.querySelector('.convo-name')?.textContent.toLowerCase() || '';
        el.style.display = name.includes(q) ? '' : 'none';
    });
}

function updateConvoPreview(userId, text) {
    const el = document.getElementById(`preview-${userId}`);
    if (el) el.textContent = text;
}

// ── Open chat ─────────────────────────────────────────────
async function openChat(userId, username) {
    activeUserId   = userId;
    activeUsername = username;
    const { status } = await LunarAPI.getFriendStatus(userId).catch(() => ({ status: 'none' }));
    const canChat = status === 'friends';

    document.querySelectorAll('.convo-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`convo-${userId}`)?.classList.add('active');

    const chatArea = document.getElementById('chatArea');
    chatArea.classList.add('active');
    chatArea.innerHTML = `
        <div class="chat-head">
          <button class="back-to-convos" onclick="document.getElementById('chatArea').classList.remove('active')">‹</button>
          <div class="avatar avatar-sm" style="flex-shrink:0">${username[0]?.toUpperCase()||'?'}</div>
          <div style="flex:1">
            <h3>${esc(username)}</h3>
            <div class="chat-status" id="chatStatus">● Đang hoạt động</div>
          </div>
          <button class="btn-icon" title="Thông tin" onclick="window.location.href='profile.html?user=${userId}'">👤</button>
        </div>
        <div class="msgs-body" id="msgsBody"></div>
        <div class="chat-input-area">
          <div style="position:relative">
            <div class="emoji-picker" id="emojiPicker"></div>
          </div>
          <div class="input-row">
            <button class="icon-btn" title="Emoji" onclick="toggleEmoji()" style="font-size:18px">😀</button>
            <label class="icon-btn" title="Gửi ảnh" style="font-size:18px;cursor:pointer">
              🖼️<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="sendImage(this)">
            </label>
            <textarea class="msg-textarea" id="msgInput" placeholder="Nhắn tin..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this); onTyping()" onfocus="document.body.classList.add('keyboard-open')" onblur="setTimeout(()=>document.body.classList.remove('keyboard-open'), 100)"></textarea>
            <button class="send-btn" onclick="sendMsg()">➤</button>
          </div>
        </div>`;

    document.getElementById('emptyChat')?.remove();
    await loadHistory(userId);
    if (!canChat) {
        const hints = {
            incoming: 'Người này đã gửi lời mời kết bạn. Hãy chấp nhận trước khi nhắn tin.',
            outgoing: 'Đang chờ người này chấp nhận lời mời kết bạn.',
            none: 'Hãy kết bạn trước khi bắt đầu trò chuyện.',
        };
        const input = document.getElementById('msgInput');
        if (input) {
            input.disabled = true;
            input.placeholder = hints[status] || hints.none;
        }
        document.querySelectorAll('#chatArea .icon-btn,#chatArea .send-btn').forEach(btn => { btn.disabled = true; btn.style.opacity = '.45'; });
    } else {
        document.getElementById('msgInput')?.focus();
    }
}

async function loadHistory(userId) {
    const body = document.getElementById('msgsBody');
    if (!body) return;
    body.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    try {
        const { messages } = await LunarAPI.getMessages(userId);
        body.innerHTML = '';
        if (!messages.length) {
            body.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:13px;margin-top:40px">Bắt đầu cuộc trò chuyện 👋</div>';
        } else {
            messages.forEach(m => appendBubble(m.content, m.sender_id === me.id, m.created_at, m.image_url, m.message_type));
        }
        scrollToBottom();
    } catch { body.innerHTML = ''; }
}

function appendBubble(content, isSent, time, imageUrl, messageType = 'user') {
    const body = document.getElementById('msgsBody');
    if (!body) return;
    showTypingIndicator(false); // remove typing indicator if a message arrives
    const div = document.createElement('div');
    if (messageType === 'system') {
        div.className = 'msg-row system';
        div.innerHTML = `<div class="bubble system">${esc(content)}</div>`;
        body.appendChild(div);
        scrollToBottom();
        return;
    }
    div.className = `msg-row ${isSent ? 'sent' : ''}`;
    const imgHtml = imageUrl ? `<img loading="lazy" src="${apiImg(imageUrl)}" onclick="window.open(apiImg('${imageUrl}'),'_blank')" style="max-width:220px;border-radius:10px;display:block;margin-top:6px;cursor:pointer">` : '';
    div.innerHTML = `
        ${!isSent ? `<div class="avatar avatar-sm" style="flex-shrink:0">${(activeUsername[0]||'?').toUpperCase()}</div>` : ''}
        <div>
          <div class="bubble ${isSent?'sent':'recv'}">${content ? esc(content) : ''}${imgHtml}</div>
          <div class="msg-time">${fmtTimeShort(time)}</div>
        </div>`;
    div.style.animation = 'fadeInUp .2s ease';
    body.appendChild(div);
    scrollToBottom();
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text || !activeUserId) return;
    appendBubble(text, true, new Date().toISOString());
    input.value = '';
    input.style.height = 'auto';
    const ok = LunarWS.sendMessage(activeUserId, text);
    if (!ok) showToast('Đang kết nối lại...', 'error');
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }
function scrollToBottom() { const b = document.getElementById('msgsBody'); if (b) b.scrollTop = b.scrollHeight; }

// ── Emoji ─────────────────────────────────────────────────
const EMOJIS = '😀😂😍🥹😎🤩🥰😘🤗😊☺️😋😜🤔😴🥺😭😤😡🙄👍👎❤️🔥✨💯🎉👏🙏💪🤝🥳🎊💬🗺️✈️🌍🏖️🏔️🍜🍣🌺🎵🌙⭐'.split('');
function toggleEmoji() {
    const p = document.getElementById('emojiPicker');
    if (!p) return;
    if (!p.innerHTML.trim()) p.innerHTML = EMOJIS.map(e => `<button class="emoji-btn" onclick="insertEmoji('${e}')">${e}</button>`).join('');
    p.classList.toggle('open');
}
function insertEmoji(e) {
    const inp = document.getElementById('msgInput');
    if (!inp) return;
    const s = inp.selectionStart;
    inp.value = inp.value.slice(0,s) + e + inp.value.slice(inp.selectionEnd);
    inp.selectionStart = inp.selectionEnd = s + e.length;
    inp.focus();
}
document.addEventListener('click', e => {
    const p = document.getElementById('emojiPicker');
    if (p && !e.target.closest('.emoji-picker') && e.target.title !== 'Emoji') p.classList.remove('open');
});

// ── Image upload in chat ───────────────────────────────────
async function sendImage(input) {
    const file = input.files?.[0];
    if (!file || !activeUserId) return;
    const fd = new FormData(); fd.append('file', file);
    try {
        const token = localStorage.getItem('lh_token');
        const r = await fetch(`${LunarAPI.apiBase()}/api/messages/image`, {
            method:'POST', headers:{'Authorization':'Bearer '+token}, body:fd
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        appendBubble('', true, new Date().toISOString(), data.image_url);
        LunarWS.send('chat', { receiverId: activeUserId, content: '[Hình ảnh]', image_url: data.image_url });
    } catch(err) { showToast(err.message, 'error'); }
    input.value = '';
}

// ── New chat ───────────────────────────────────────────────
function openNewChatModal() {
    document.getElementById('newChatModal')?.classList.add('open');
    setTimeout(() => document.getElementById('newChatSearch')?.focus(), 100);
}
function closeNewChatModal() {
    document.getElementById('newChatModal')?.classList.remove('open');
    const r = document.getElementById('newChatResults'); if(r) r.innerHTML='';
    const s = document.getElementById('newChatSearch');  if(s) s.value='';
}
let _searchT;
async function searchNewChat(q) {
    clearTimeout(_searchT);
    const res = document.getElementById('newChatResults');
    if (!q.trim()) { res.innerHTML = ''; return; }
    _searchT = setTimeout(async () => {
        try {
            const { users } = await LunarAPI.searchUsers(q);
            if (!users.length) { res.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:16px;font-size:13px">Không tìm thấy</div>'; return; }
            res.innerHTML = users.map(u => `
                <div class="user-result" onclick="startChat('${u.id}','${u.username.replace(/'/g,"\\'")}')">
                  <div class="avatar avatar-sm" style="flex-shrink:0">${u.avatar_url?`<img loading="lazy" src="${apiImg(u.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:u.username[0].toUpperCase()}</div>
                  <div><div style="font-size:13.5px;font-weight:500">${esc(u.username)}</div><div style="font-size:12px;color:var(--text-muted)">${esc(u.bio||'')}</div></div>
                </div>`).join('');
        } catch(err) { res.innerHTML = `<div style="color:var(--red);padding:10px;font-size:13px">${err.message}</div>`; }
    }, 350);
}

function startChat(uid, uname) { closeNewChatModal(); openChat(uid, uname); }

// ── Utilities ─────────────────────────────────────────────
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function apiImg(url) {
    if (!url) return '';
    if (url.startsWith('http://') || url.startsWith('https://')) return url;
    return LunarAPI.apiBase() + url;
}
function fmtTime(iso) { if(!iso) return ''; try { const d=new Date(iso),diff=Date.now()-d; if(diff<3600e3) return Math.floor(diff/60e3)+'ph'; if(diff<86400e3) return Math.floor(diff/3600e3)+'g'; return d.toLocaleDateString('vi-VN'); } catch{return '';} }
function fmtTimeShort(iso) { if(!iso) return ''; try { const d=new Date(iso); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); } catch{return '';} }

function showToast(msg, type='success') {
    const box = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = (type==='success'?'✓ ':'✗ ')+msg;
    box.appendChild(t); setTimeout(()=>t.remove(), 3000);
}
